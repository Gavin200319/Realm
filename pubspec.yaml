name: reality_merge
description: "Reality Merge v2 — location-unlocked social drops, worldwide."
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.9.1
  mapbox_maps_flutter: ^2.2.0
  geolocator: ^12.0.0
  image_picker: ^1.2.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  http: ^1.5.0

  file_picker: ^10.3.2

  shared_preferences: ^2.5.3
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
