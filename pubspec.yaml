name: reality_merge
description: "Reality Merge v2 — location-unlocked social drops, worldwide."
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  mapbox_maps_flutter: ^2.2.0
  geolocator: ^12.0.0
  geolocator_android: ^4.6.1
  geolocator_apple: ^2.3.7
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  http: ^1.2.0
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  video_player: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
